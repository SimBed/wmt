default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: wmt_development

test:
  <<: *default
  database: wmt_test

production:
  primary: &primary_production
    <<: *default
    database: wmt_production
    username: railsapps
    password: <%= Rails.application.credentials.dig(:production, :database_password) %>
  cache:
    <<: *primary_production
    database: wmt_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: wmt_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: wmt_production_cable
    migrations_paths: db/cable_migrate